<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레이아웃02</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: rgb(227, 197, 255);
      }
      #contaienr {
        width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
      }
      #header {
        width: 100%;
        height: 100px;
        background-color: #ffb1b1;
      }
      #nav {
        width: 100%;
        height: 100px;
        background-color: #ff569d;
      }
      #aside {
        width: 33.333%;
        height: 780px;
        background-color: #cbff3c;
      }
      #section {
        width: 66.666%;
        height: 780px;
        background-color: #72ff95;
      }
      #footer {
        width: 100%;
        height: 100px;
        background-color: #5078ff;
      }

      /* 미디어 쿼리 */
      /* 데스크탑 노트북 */
      @media (max-width: 1300px) {
        #container {
          width: 96%;
        }
      }

      /* 태블릿 */
      @media (max-width: 786px) {
        #container {
          width: 100%;
        }
      }

      /* 모바일 */
      @media (max-width: 480px) {
        #aside {
          width: 100%;
          height: 300px;
        }
        #section {
          width: 100%;
          height: 100px;
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <header id="header"></header>
      <nav id="nav"></nav>
      <aside id="aside"></aside>
      <section id="section"></section>
      <footer id="footer"></footer>
    </div>
    <!-- flex 레이아웃 -->
    <!-- 
     -->
  </body>
</html>
