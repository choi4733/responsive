<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레이아웃01</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: rgb(227, 197, 255);
      }
      #contaienr {
        width: 1200px;
        margin: 0 auto;

        display: grid;
        grid-template-areas:
          "header haeder "
          "nav nav"
          "aside setyion"
          "footer footer";
        grid-template-columns: 33% 67%;
        grid-template-rows: 100px 100px 780px 100px;
      }
      #header {
        background-color: #ffb1b1;
        grid-area: haeder;
      }
      #nav {
        width: 100%;
        background-color: #ff569d;
        grid-area: nav;
      }
      #aside {
        background-color: #cbff3c;
        grid-area: aside;
      }
      #section {
        background-color: #72ff95;
        grid-area: section;
      }
      #footer {
        background-color: #5078ff;
        grid-area: footer;
      }
      /* 미디어 쿼리 */
      /* 데스크탑 노트북 */
      @media (max-width: 1300px) {
        #container {
          width: 90%;
        }
      }

      /* 태블릿 */
      @media (max-width: 786px) {
        #container {
          width: 100%;
        }
      }

      /* 모바일 */
      @media (max-width: 480px) {
        #container {
          grid-template-areas:
            "header "
            "nav "
            "aside "
            "footer ";
          grid-template-columns: 100%;
          grid-template-rows: 100px 100px 300px 480px 100pxs;
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <header id="header"></header>
      <nav id="nav"></nav>
      <aside id="aside"></aside>
      <section id="section"></section>
      <footer id="footer"></footer>
      <!-- grid  -->
    </div>
  </body>
</html>
